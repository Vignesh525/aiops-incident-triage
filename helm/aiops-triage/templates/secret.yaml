{{- if and .Values.secret.create (not .Values.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiops-triage.secretName" . }}
  labels:
    {{- include "aiops-triage.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
{{- end }}
