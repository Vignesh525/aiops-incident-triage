apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aiops-triage-api
  namespace: aiops-triage
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
spec:
  ingressClassName: nginx
  rules:
    - host: aiops-triage.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aiops-triage-api
                port:
                  number: 80
