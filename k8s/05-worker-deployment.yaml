apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-triage-worker
  namespace: aiops-triage
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: aiops-triage-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: aiops-triage-worker
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: aiops-triage-worker
      containers:
        - name: worker
          image: ghcr.io/your-org/aiops-incident-triage:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "workers.kafka_worker"]
          envFrom:
            - configMapRef:
                name: aiops-triage-config
            - secretRef:
                name: aiops-triage-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
